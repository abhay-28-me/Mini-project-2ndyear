<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KeyAuth{% endblock %} — Keystroke Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── CSS Variables ─────────────────────────────────── */
        :root {
            --bg:        #09090f;
            --surface:   #111118;
            --border:    #1e1e2e;
            --accent:    #6ee7f7;
            --accent2:   #a78bfa;
            --success:   #4ade80;
            --danger:    #f87171;
            --warning:   #fbbf24;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --mono:      'Space Mono', monospace;
            --sans:      'Syne', sans-serif;
            --radius:    12px;
            --glow:      0 0 30px rgba(110, 231, 247, 0.15);
        }

        /* ── Reset ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated grid background ──────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(110,231,247,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(110,231,247,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Nav ───────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: var(--mono);
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo .dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-family: var(--mono);
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            border-color: var(--border);
            background: rgba(110,231,247,0.05);
        }

        /* ── Page wrapper ──────────────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding-top: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,0.4);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            margin-bottom: 36px;
            text-align: center;
        }

        .card-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, rgba(110,231,247,0.15), rgba(167,139,250,0.15));
            border: 1px solid rgba(110,231,247,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 20px;
        }

        .card h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .card p.subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            font-family: var(--mono);
        }

        /* ── Form elements ─────────────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.95rem;
            padding: 14px 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(110,231,247,0.04);
            box-shadow: 0 0 0 3px rgba(110,231,247,0.1);
        }

        /* ── Buttons ───────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a14;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(110,231,247,0.3);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* ── Alerts ────────────────────────────────────────── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-family: var(--mono);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.3s ease both;
        }

        .alert-success {
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.3);
            color: var(--success);
        }

        .alert-danger {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: var(--danger);
        }

        .alert-info {
            background: rgba(110,231,247,0.08);
            border: 1px solid rgba(110,231,247,0.2);
            color: var(--accent);
        }

        /* ── Divider ───────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 0.75rem;
            font-family: var(--mono);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Progress bar ──────────────────────────────────── */
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.3s ease;
        }

        /* ── Keystroke stats ───────────────────────────────── */
        .ks-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .ks-stat {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .ks-stat .val {
            font-family: var(--mono);
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 700;
        }

        .ks-stat .lbl {
            font-size: 0.65rem;
            color: var(--muted);
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* ── Footer text ───────────────────────────────────── */
        .foot-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--muted);
            font-family: var(--mono);
        }

        .foot-text a {
            color: var(--accent);
            text-decoration: none;
        }

        .foot-text a:hover { text-decoration: underline; }

        /* ── Spinner ───────────────────────────────────────── */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #0a0a14;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 520px) {
            .card { padding: 32px 24px; margin: 16px; }
            nav { padding: 16px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="/">
            <span class="dot"></span>
            KeyAuth
        </a>
        <ul class="nav-links">
            <li><a href="/login"    {% if request.path == '/login'    %}class="active"{% endif %}>Login</a></li>
            <li><a href="/register" {% if request.path == '/register' %}class="active"{% endif %}>Register</a></li>
        </ul>
    </nav>

    <div class="page">
        {% block content %}{% endblock %}
    </div>

    <script src="/static/js/keystroke.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
